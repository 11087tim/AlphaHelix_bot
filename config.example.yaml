# 要追蹤的 X 帳號（不含 @），例如 ["elonmusk", "OpenAI"]
accounts: ["elonmusk", "OpenAI"]

# 要追蹤的關鍵字或 hashtag，例如 ["#AI", "台積電"]
keywords: []

# 每個帳號/關鍵字每次最多抓幾則推文
max_results_per_source: 10

# 只抓「過去幾小時內」的貼文（時間窗，單位：小時）
fetch_window_hours: 1

media:
  enabled: true    # 抓取並在網站/信件顯示貼文的圖片/影片縮圖
  describe: false  # 用視覺模型讓 AI 看懂圖片並寫進摘要（需 vision 模型，會增加成本）

openrouter:
  # 可隨時替換成 OpenRouter 上任何模型代號
  model: "anthropic/claude-haiku-4.5"

  # 跨時間記憶的立場萃取模型（Phase 2）。需判斷/校準但量小，預設 Sonnet；想省可改 Haiku。
  memory_model: "anthropic/claude-sonnet-5"

  # 摘要用的 system prompt。留空則使用程式內建預設值（src/summarizer.py 的 DEFAULT_SYSTEM_PROMPT）。
  # 想自訂就用 | 區塊寫多行，例如：
  # system_prompt: |
  #   你是一個推文摘要助手，請用繁體中文整理重點，並用 [n] 標記引用來源…
  system_prompt: ""

site:
  title: "每日 X 摘要"
  output_dir: "docs"
  url: "https://<your-account>.github.io/<repo>/"
  # fetch 產生網站後，自動把 docs/ commit & push 到 GitHub（Pages 會自動重新部署）
  auto_push: true

email:
  # prod（正式收件）：只在 prod_hours 這些整點寄；dev（開發收件）：每次執行都寄
  prod:
    - "you@example.com"
  dev: []
  prod_hours: [8, 20]
  subject_prefix: "[Daily X Digest]"

# 長訪談/論壇來源（Podcast RSS → Whisper 轉錄 → 蒸餾進 digest）；需在 .env 設 GROQ_API_KEY
podcasts:
  enabled: false
  feeds: []               # 填 podcast RSS 網址（用 itunes lookup 或 getrssfeed.com 由節目名查）
  window_hours: 72
  max_episodes: 3
  whisper_model: "whisper-large-v3-turbo"

# YouTube 長影音來源（頻道 RSS → 免費字幕 youtube-transcript-api → 蒸餾進 digest）
youtube:
  enabled: false
  channels: []          # channel_id（UC…）；可用 python -c "from src.youtube_client import resolve_channel_id; print(resolve_channel_id('@Asianometry'))" 查
  window_hours: 336
  max_videos: 2
