{% from "_macros.html" import hour_body %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: -apple-system, "Noto Sans TC", sans-serif; max-width: 720px; margin: 0 auto; padding: 16px; line-height: 1.7; color: #1a1a1a; }
    h1 { font-size: 1.4rem; border-bottom: 2px solid #1d9bf0; padding-bottom: 6px; }
    .meta { color: #666; font-size: 0.85rem; margin-bottom: 20px; }
    .hour { border: 1px solid #e6e6e6; border-radius: 10px; padding: 4px 18px 14px; margin: 14px 0; }
    .hour > h2 { font-size: 1.1rem; color: #1d9bf0; margin: 12px 0 4px; }
    .model { display: inline-block; font-size: 0.72rem; font-weight: 500; color: #555; background: #eef3f8; border: 1px solid #d7e3ee; border-radius: 999px; padding: 1px 8px; vertical-align: middle; }
    .relevance { margin: 4px 0 12px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
    .relevance .rlabel { font-size: 0.8rem; font-weight: 600; color: #888; margin-right: 4px; }
    .relevance .tag { display: inline-block; font-size: 0.8rem; padding: 2px 8px; border-radius: 999px; text-decoration: none; margin: 2px 4px 2px 0; }
    .relevance .tag.co { background: #eaf3ff; color: #185fa5; border: 1px solid #cfe2fb; font-weight: 600; }
    .relevance .tag.th { background: #f1eef8; color: #5b4a9c; border: 1px solid #ded5f0; }
    h3.cat { font-size: 1rem; margin: 12px 0 6px; color: #555; }
    h4 { font-size: 0.98rem; margin: 10px 0 4px; color: #333; }
    .section { border-top: 1px solid #f0f0f0; padding-top: 8px; margin-top: 8px; }
    .summary p { margin: 6px 0; text-indent: 2em; }
    .summary p.maintopic { margin: 22px 0 8px; font-size: 1.22rem; font-weight: 700; color: #1d9bf0; text-indent: 0; padding-bottom: 4px; border-bottom: 1px solid #e6eef5; }
    .summary p.subhead { margin: 12px 0 4px; font-size: 1.02rem; font-weight: 600; color: #333; text-indent: 0; }
    .summary ul, .summary ol { margin: 6px 0; padding-left: 22px; }
    .summary li { margin: 3px 0; }
    .media { margin: 10px 0 4px; }
    .media-item { position: relative; display: inline-block; margin: 0 8px 8px 0; }
    .media-item img { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid #e2e2e2; }
    .media-item .play { position: absolute; left: 0; top: 0; width: 120px; height: 120px; text-align: center; line-height: 120px; font-size: 1.6rem; color: #fff; }
    a { color: #1d9bf0; }
    a.cite { font-weight: 600; text-decoration: none; padding: 0 1px; }
    .refs { margin-top: 12px; padding-top: 8px; border-top: 1px dashed #e2e2e2; font-size: 0.85rem; color: #666; }
    .refs ol { margin: 6px 0 0; padding-left: 22px; }
    footer { margin-top: 30px; color: #999; font-size: 0.8rem; text-align: center; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  <p class="meta">本次涵蓋 {{ digests|length }} 個時段的摘要（{{ range_label }}）。完整可折疊版面請見網站：<a href="{{ site_url }}">{{ site_url }}</a></p>

  {% for d in digests %}
  <div class="hour">
    <h2>🕐 {{ d.generated_at }}{% if d.model %} <span class="model">{{ d.model }}</span>{% endif %}</h2>
    {{ hour_body(d) }}
  </div>
  {% endfor %}

  <footer>由 Alphehelix X Bot 自動產生</footer>
</body>
</html>
