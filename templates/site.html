{% from "_macros.html" import hour_body %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    body { font-family: -apple-system, "Noto Sans TC", sans-serif; max-width: 820px; margin: 0 auto; padding: 24px; line-height: 1.7; color: #1a1a1a; background: #fafafa; }
    h1 { font-size: 1.6rem; border-bottom: 2px solid #1d9bf0; padding-bottom: 8px; }
    .meta { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    details.hour { background: #fff; border: 1px solid #e6e6e6; border-radius: 10px; margin: 12px 0; overflow: hidden; }
    details.hour > summary { cursor: pointer; padding: 14px 18px; font-size: 1.1rem; font-weight: 600; color: #1d9bf0; list-style: none; user-select: none; }
    details.hour > summary::-webkit-details-marker { display: none; }
    details.hour > summary::before { content: "▸ "; display: inline-block; transition: transform .15s; }
    details.hour[open] > summary::before { content: "▾ "; }
    .model { display: inline-block; font-size: 0.72rem; font-weight: 500; color: #555; background: #eef3f8; border: 1px solid #d7e3ee; border-radius: 999px; padding: 1px 8px; vertical-align: middle; }
    .hour-body { padding: 0 18px 14px; }
    h3.cat { font-size: 1rem; margin: 14px 0 6px; color: #555; }
    h4 { font-size: 0.98rem; margin: 10px 0 4px; color: #333; }
    .section { border-top: 1px solid #f0f0f0; padding-top: 8px; margin-top: 8px; }
    .summary p { margin: 6px 0; }
    .summary p.subhead { margin: 12px 0 4px; font-weight: 600; }
    .summary ul, .summary ol { margin: 6px 0; padding-left: 22px; }
    .summary li { margin: 3px 0; }
    a { color: #1d9bf0; }
    a.cite { font-weight: 600; text-decoration: none; padding: 0 1px; }
    a.cite:hover { text-decoration: underline; }
    details.refs { margin-top: 12px; padding-top: 8px; border-top: 1px dashed #e2e2e2; font-size: 0.85rem; color: #666; }
    details.refs > summary { cursor: pointer; color: #1d9bf0; font-weight: 600; list-style: none; user-select: none; }
    details.refs > summary::-webkit-details-marker { display: none; }
    details.refs > summary::before { content: "▸ "; }
    details.refs[open] > summary::before { content: "▾ "; }
    .refs ol { margin: 6px 0 0; padding-left: 22px; }
    .refs li { margin: 2px 0; }
    footer { margin-top: 40px; color: #999; font-size: 0.8rem; text-align: center; }
    .empty { color: #999; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  <p class="meta">最後更新：{{ updated_at }}｜每小時更新，點各時段標題可展開/收合</p>

  {% for d in digests %}
  <details class="hour"{% if loop.first %} open{% endif %}>
    <summary>🕐 {{ d.generated_at }}{% if d.model %} <span class="model">{{ d.model }}</span>{% endif %}</summary>
    <div class="hour-body">{{ hour_body(d, true) }}</div>
  </details>
  {% else %}
  <p class="empty">目前還沒有任何摘要。</p>
  {% endfor %}

  <footer>由 Alphehelix X Bot 自動產生</footer>
</body>
</html>
